<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>School Simulator 3D</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="loadingScreen">
    <h1>School Simulator 3D</h1>
    <p>Click Start Game</p>

    <button id="startButton">
        Start Game
    </button>
</div>

<div id="hud">

    <div id="crosshair">
        +
    </div>

    <div id="topLeftPanel">

        <div>
            Rank:
            <span id="rank">
                Assistant Teacher
            </span>
        </div>

        <div>
            XP:
            <span id="xp">
                0
            </span>
        </div>

        <div>
            Reputation:
            <span id="reputation">
                50
            </span>
        </div>

        <div>
            Salary:
            ₹<span id="salary">
                25000
            </span>
        </div>

        <div>
            Day:
            <span id="day">
                1
            </span>
        </div>

    </div>

    <div id="bottomHelp">

        W A S D = Move<br>
        Mouse = Look Around<br>
        Space = Stand Student<br>
        Left Click = Sit Student<br>
        B = Blackboard

    </div>

</div>

<div id="blackboardUI">

    <h3>Blackboard</h3>

    <textarea
        id="boardText"
        placeholder="Type lesson here..."
    ></textarea>

    <br>

    <button id="closeBoard">
        Close
    </button>

</div>

<script type="module" src="js/main.js"></script>

</body>
</html>
